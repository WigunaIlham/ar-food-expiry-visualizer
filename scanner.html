<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>AR Food Expiry Visualizer — Scanner</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body class="scanner-body">
    <div class="scanner-topbar">
      <a href="index.html" class="btn btn-ghost btn-sm">← DASHBOARD</a>
      <span id="markerCount" class="count-badge">0 MARKER AKTIF</span>
    </div>

    <a-scene
      embedded
      arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; precision: medium;"
      id="arScene"
    >
      <a-entity camera></a-entity>
    </a-scene>

    <div id="infoPanel" class="scanner-info-panel" hidden>
      <div class="info-row">
        <span class="info-label">PRODUK</span><span id="infoNama">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">STATUS</span
        ><span id="infoStatus" class="badge">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">SISA_HARI</span><span id="infoSisa">—</span>
      </div>
    </div>

    <div id="noMarkerState" class="scanner-empty" hidden>
      <p>:: NO_MARKER_REGISTERED ::</p>
      <p>Generate marker dari dashboard terlebih dahulu.</p>
      <a href="index.html" class="btn btn-primary">← KEMBALI</a>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/expiry.js"></script>
    <script src="js/scanner.js"></script>
  </body>
</html>
