<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR Food Expiry Visualizer — Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="terminal-frame">
      <header class="topbar">
        <div class="brand">[ AR_FOOD_EXPIRY ]</div>
        <div class="topbar-actions">
          <a href="add-product.html" class="btn btn-primary">+ TAMBAH PRODUK</a>
          <a href="scanner.html" class="btn btn-ghost" id="arScannerBtn"
            >► BUKA KAMERA AR</a
          >
        </div>
      </header>

      <main class="panel">
        <div class="panel-header">
          <span>DAFTAR_PRODUK</span>
          <span id="productCount" class="count-badge">0 ITEMS</span>
        </div>

        <div class="table-wrap">
          <table id="productTable">
            <thead>
              <tr>
                <th>MARKER_ID</th>
                <th>NAMA_PRODUK</th>
                <th>TGL_BELI</th>
                <th>MASA_SIMPAN</th>
                <th>STATUS</th>
                <th>SISA_HARI</th>
                <th>ACTIONS</th>
              </tr>
            </thead>
            <tbody id="productTableBody"></tbody>
          </table>
          <div id="emptyState" class="empty-state" hidden>
            <p>:: NO_DATA ::</p>
            <p>Belum ada produk. Tambahkan produk untuk mulai tracking.</p>
          </div>
        </div>
      </main>

      <footer class="statusbar">
        <span>STORAGE: LOCAL</span>
        <span id="clock"></span>
      </footer>
    </div>

    <div id="markerModal" class="modal" hidden>
      <div class="modal-box">
        <div class="modal-header">
          <span>MARKER_INFO</span>
          <button id="closeModal" class="btn-icon">×</button>
        </div>
        <div class="modal-body" id="markerModalBody"></div>
      </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/expiry.js"></script>
    <script src="js/marker.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
